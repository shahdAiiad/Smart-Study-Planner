<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create your account — SmartStudy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="js/auth.js"></script>
  <script src="js/translations.js"></script>

  <!-- Google Identity Services (OAuth 2.0) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // ===========================================================
    //  Google OAuth 2.0 setup
    //  Replace YOUR_GOOGLE_CLIENT_ID with the Web Client ID
    //  you created in Google Cloud Console. (See README.)
    // ===========================================================
    const GOOGLE_CLIENT_ID = '200121641033-c1dtivdh68ue0qfi2bbjsro4b7hpik3i.apps.googleusercontent.com';
    let tokenClient = null;

    function initGoogle() {
      if (typeof google === 'undefined' || !google.accounts) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
        callback: handleTokenResponse,
        error_callback: handleAuthError,
      });
    }

    function handleTokenResponse(response) {
      if (!response || !response.access_token) {
        showError('No access token received from Google.');
        return;
      }
      // Send the access token to OUR backend. The backend verifies it with
      // Google, creates or finds the user, and returns our own JWT.
      Auth.api('/api/auth/google', {
        method: 'POST',
        body: { access_token: response.access_token },
      })
        .then(({ token, user }) => {
          Auth.saveSession(token, user);
          window.location.href = 'dashboard.html';
        })
        .catch(err => showError(err.message));
    }

    function handleAuthError(err) {
      if (err && err.type === 'popup_closed') return;
      if (err && err.message) {
        showError('Google sign-in error: ' + err.message);
      } else {
        showError('Google sign-in failed. Make sure your Client ID is configured.');
      }
    }

    async function continueWithGoogle() {
      if (!tokenClient) {
        if (GOOGLE_CLIENT_ID.startsWith('YOUR_GOOGLE_CLIENT_ID')) {
          showError(
            'Google Client ID not configured.\n\n' +
            'Open backend/.env and set GOOGLE_CLIENT_ID, then restart the server.'
          );
        } else {
          showError('Google Sign-In is still loading. Please try again in a second.');
        }
        return;
      }
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    // Email/password signup
    async function signupWithEmail(ev) {
      ev.preventDefault();
      const form = ev.target;
      const name     = form.name.value.trim();
      const email    = form.email.value.trim();
      const password = form.password.value;

      if (password.length < 8) return showError('Password must be at least 8 characters.');

      setLoading(form.querySelector('button[type="submit"]'), true);
      try {
        const { token, user } = await Auth.api('/api/auth/signup', {
          method: 'POST',
          body: { name, email, password },
        });
        Auth.saveSession(token, user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(form.querySelector('button[type="submit"]'), false);
      }
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.dataset.original = btn.dataset.original || btn.textContent;
      btn.textContent = loading ? 'Creating account…' : btn.dataset.original;
    }

    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    window.addEventListener('load', () => {
      const wait = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
          clearInterval(wait);
          initGoogle();
        }
      }, 100);

      // Already logged in? Skip the form.
      if (Auth.isLoggedIn()) {
        Auth.refreshMe().then(u => { if (u) window.location.href = 'dashboard.html'; });
      }
    });
  </script>
</head>
<body class="signup-page">
  <div class="language-switcher">
    <button id="langBtn">🌐 العربية</button>
  </div>


  <header class="auth-header">
    <a class="brand brand-center" href="index.html">
      <span class="brand-mark brand-mark-sm">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2z"/>
        </svg>
      </span>
      <span class="brand-name">SmartStudy</span>
    </a>
  </header>

  <main class="auth-main">
    <section class="signup-card signup-card-standalone">
      <h1 class="signup-title signup-title-left" data-lang="signupTitle">Create your account</h1>
      <p class="signup-sub signup-sub-left" data-lang="signupSub">Start studying smarter in 60 seconds.</p>

      <button class="btn btn-ghost btn-block btn-lg btn-google-dark" type="button" onclick="continueWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.638-.057-1.252-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.616z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        <span data-lang="google">Continue with Google</span>
      </button>

      <div class="divider"><span data-lang="or">OR</span></div>

      <div id="form-error" class="form-error" style="display:none"></div>

      <form class="signup-form" onsubmit="signupWithEmail(event)">
        <label class="field">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" name="name" placeholder="Full name" data-lang="fullname" required  />
        </label>

        <label class="field">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6"/>
            </svg>
          </span>
          <input type="email" name="email" placeholder="Email"  data-lang="email" required />
        </label>

        <label class="field">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="11" width="16" height="10" rx="2"/>
              <path d="M8 11V7a4 4 0 1 1 8 0v4"/>
            </svg>
          </span>
          <input type="password" name="password" placeholder="Password (min 8 chars)" data-lang="password"minlength="8" required />
        </label>

       <button
          class="btn btn-primary btn-block btn-lg"
          type="submit"
          data-lang="signup">
          Sign up
       </button>
      </form>

      <p class="signup-foot">
        <span data-lang="already">Already have an account?</span>
        <a href="login.html" data-lang="login">Sign in</a>
      </p>
    </section>
  </main>

</body>
</html>
